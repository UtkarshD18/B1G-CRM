services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PGUSER:-b1gcrm}
      POSTGRES_PASSWORD: ${PGPASSWORD}
      POSTGRES_DB: ${PGDATABASE:-b1gcrm}
    ports:
      - "${PGPORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGUSER:-b1gcrm} -d ${PGDATABASE:-b1gcrm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3010}
      DATABASE_URL: ""
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${PGUSER:-b1gcrm}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE:-b1gcrm}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3010}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3010}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3010,http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-3010}:${PORT:-3010}"
    volumes:
      - app-logs:/app/logs
      - app-sessions:/app/sessions
      - app-contacts:/app/contacts
      - app-conversations:/app/conversations
      - app-flow-json:/app/flow-json
      - app-media:/app/client/public/media

  retry-worker:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ""
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${PGUSER:-b1gcrm}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE:-b1gcrm}
    command: node workers/retryWorker.js
    depends_on:
      postgres:
        condition: service_healthy

  health-worker:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ""
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${PGUSER:-b1gcrm}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE:-b1gcrm}
    command: node workers/healthWorker.js
    depends_on:
      postgres:
        condition: service_healthy

  incoming-worker:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ""
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${PGUSER:-b1gcrm}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE:-b1gcrm}
    command: node workers/incomingWorker.js
    depends_on:
      postgres:
        condition: service_healthy

  scheduler-worker:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: ""
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: ${PGUSER:-b1gcrm}
      PGPASSWORD: ${PGPASSWORD}
      PGDATABASE: ${PGDATABASE:-b1gcrm}
    command: node workers/schedulerWorker.js
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  app-logs:
  app-sessions:
  app-contacts:
  app-conversations:
  app-flow-json:
  app-media:
