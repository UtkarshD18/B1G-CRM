name: Pull Request Validation CI

on:
  push:
  pull_request:

jobs:
  pr-validation:
    name: Lint, Test & Validate Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: b1gcrm
          POSTGRES_USER: b1gcrm
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Root Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Client Dependencies
        run: cd client && npm ci --legacy-peer-deps

      - name: Run Database Migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgres://b1gcrm@localhost:5432/b1gcrm

      - name: Start Backend Server
        run: |
          node server.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 5
        env:
          DATABASE_URL: postgres://b1gcrm@localhost:5432/b1gcrm
          JWT_SECRET: change-me-local-jwt-key
          PORT: 3010

      - name: Seed Demo Data
        run: node scratch/run_seeder.js
        env:
          TEST_USER_PASSWORD: CHANGE_ME

      - name: Run Backend Integration & Parity Tests
        run: npm test
        env:
          DATABASE_URL: postgres://b1gcrm@localhost:5432/b1gcrm
          JWT_SECRET: change-me-local-jwt-key

      - name: Stop Backend Server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID
          fi

      - name: Run Client Linting
        run: cd client && npm run lint

      - name: Run Client Jest Tests
        run: cd client && npm run test

      - name: Verify Client Build
        run: cd client && npm run build
