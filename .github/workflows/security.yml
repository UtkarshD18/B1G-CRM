name: Security CI

on:
  push:
  pull_request:

jobs:
  security-scan:
    name: Security Scans & Regression Tests
    runs-on: ubuntu-latest
    env:
      CHANNEL_SECRET_KEY: test-channel-secret-key-at-least-32-chars-long

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: b1gcrm
          POSTGRES_USER: b1gcrm
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U b1gcrm"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Root Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Client Dependencies
        run: cd client && npm ci --legacy-peer-deps

      - name: Run NPM Audit
        run: npm audit --audit-level=high || echo "Audit found vulnerabilities"

      - name: Run Migrations
        run: npm run migrate || echo "No migration script or migrations already applied"
        env:
          DATABASE_URL: postgres://b1gcrm@localhost:5432/b1gcrm
          NODE_ENV: test

      - name: Start Backend Server
        run: |
          node server.js > server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -s http://127.0.0.1:3010/api/health > /dev/null 2>&1; then
              echo "Server is up after ${i}s"
              break
            fi
            echo "Waiting for server... attempt $i"
            sleep 1
          done
          if ! curl -s http://127.0.0.1:3010/api/health > /dev/null 2>&1; then
            echo "=== SERVER LOGS ON FAILURE ==="
            cat server.log
            exit 1
          fi
        env:
          DATABASE_URL: postgres://b1gcrm@localhost:5432/b1gcrm
          JWT_SECRET: test-jwt-secret-key-at-least-32-chars-long
          PORT: 3010
          NODE_ENV: test

      - name: Run Backend Auth Verification
        run: node scratch/verify-backend-auth.js
        env:
          DATABASE_URL: postgres://b1gcrm@localhost:5432/b1gcrm
          JWT_SECRET: test-jwt-secret-key-at-least-32-chars-long

      - name: Run Agent Permission Reality Verification
        run: node scratch/verify-permissions-reality.js
        env:
          DATABASE_URL: postgres://b1gcrm@localhost:5432/b1gcrm
          JWT_SECRET: test-jwt-secret-key-at-least-32-chars-long

      - name: Run Security Regression Tests
        run: node scratch/verify-regression-safety.js
        env:
          DATABASE_URL: postgres://b1gcrm@localhost:5432/b1gcrm
          JWT_SECRET: test-jwt-secret-key-at-least-32-chars-long

      - name: Stop Backend Server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID
          fi
