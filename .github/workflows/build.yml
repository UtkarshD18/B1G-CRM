name: Build Validation CI

on:
  push:
  pull_request:

jobs:
  build:
    name: Build & Verify Backend Startup
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: b1gcrm
          POSTGRES_USER: b1gcrm
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Root Dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Client Dependencies
        run: cd client && npm ci --legacy-peer-deps

      - name: Build Client
        run: cd client && npm run build

      - name: Run Database Migrations
        run: npm run db:migrate
        env:
          DATABASE_URL: postgres://b1gcrm@localhost:5432/b1gcrm

      - name: Verify Backend Startup
        run: |
          node server.js &
          APP_PID=$!
          echo "Started backend server with PID $APP_PID"
          
          # Wait up to 30 seconds for the health endpoint to respond
          for i in {1..15}; do
            if curl -s http://localhost:3010/api/health; then
              echo "Backend is healthy and running!"
              kill $APP_PID
              exit 0
            fi
            echo "Waiting for backend..."
            sleep 2
          done
          
          echo "Backend failed to start in time!"
          kill $APP_PID
          exit 1
        env:
          DATABASE_URL: postgres://b1gcrm@localhost:5432/b1gcrm
          JWT_SECRET: change-me-local-jwt-key
          PORT: 3010
